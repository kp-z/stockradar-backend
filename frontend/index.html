      h += `<select class="cond-input pc-field" data-f="op" style="width:42px;"><option value="gt" ${rule.op==='gt'?'selected':''}>大于</option><option value="lt" ${rule.op==='lt'?'selected':''}>小于</option></select>`;
      h += `<span class="cond-unit" style="color:var(--muted);">往前第</span>`;
      h += `<input type="number" class="cond-input pc-field" data-f="dayR" value="${rule.dayR||2}" step="1" min="1" style="width:36px;" />`;
      h += `<span class="cond-unit" style="color:var(--muted);">天</span>`;
      h += `<select class="cond-input pc-field" data-f="fieldR" style="width:52px;"><option value="close" ${rule.fieldR==='close'?'selected':''}>收盘</option><option value="open" ${rule.fieldR==='open'?'selected':''}>开盘</option><option value="high" ${rule.fieldR==='high'?'selected':''}>最高</option><option value="low" ${rule.fieldR==='low'?'selected':''}>最低</option></select>`;
      h += `<span class="cond-unit" style="color:var(--muted);">的</span>`;
      h += `<input type="number" class="cond-input pc-field" data-f="multiplier" value="${rule.multiplier||''}" step="0.1" min="0" style="width:40px;" placeholder="" />`;
      h += `<span class="cond-unit" style="color:var(--muted);">倍</span>`;
      if (ri > 0) h += `<button class="cond-del-rule-btn pc-del-btn" data-scheme="${schemeId}" data-key="priceCompare" data-ri="${ri}">✕</button>`;
      h += `</div>`;
    });
    h += `<div class="cond-hint">倍数不填代表只要满足大于或小于即可</div>`;
    h += `<div class="condition-row cond-sub-row"><button class="cond-add-rule-btn pc-add-btn" data-scheme="${schemeId}" data-key="priceCompare">＋ 增加条件</button></div>`;
    return h;
  } else if (k === 'amountCompare') {
    const rules = cond.rules || [{ dayL:1, op:'gt', dayR:2 }];
    h += `</div>`;
    rules.forEach((rule, ri) => {
      h += `<div class="condition-row cond-sub-row ac-rule" data-scheme="${schemeId}" data-key="amountCompare" data-ri="${ri}">`;
      h += `<span class="cond-unit" style="color:var(--muted);">往前第</span>`;
      h += `<input type="number" class="cond-input ac-field" data-f="dayL" value="${rule.dayL||1}" step="1" min="1" style="width:36px;" />`;
      h += `<span class="cond-unit" style="color:var(--muted);">天成交额</span>`;
      h += `<select class="cond-input ac-field" data-f="op" style="width:42px;"><option value="gt" ${rule.op==='gt'?'selected':''}>大于</option><option value="lt" ${rule.op==='lt'?'selected':''}>小于</option></select>`;
      h += `<span class="cond-unit" style="color:var(--muted);">往前第</span>`;
      h += `<input type="number" class="cond-input ac-field" data-f="dayR" value="${rule.dayR||2}" step="1" min="1" style="width:36px;" />`;
      h += `<span class="cond-unit" style="color:var(--muted);">天成交额的</span>`;
      h += `<input type="number" class="cond-input ac-field" data-f="multiplier" value="${rule.multiplier||''}" step="0.1" min="0" style="width:40px;" placeholder="" />`;
      h += `<span class="cond-unit" style="color:var(--muted);">倍</span>`;
      if (ri > 0) h += `<button class="cond-del-rule-btn ac-del-btn" data-scheme="${schemeId}" data-key="amountCompare" data-ri="${ri}">✕</button>`;
      h += `</div>`;
    });
    h += `<div class="cond-hint">倍数不填代表只要满足大于或小于即可</div>`;
    h += `<div class="condition-row cond-sub-row"><button class="cond-add-rule-btn ac-add-btn" data-scheme="${schemeId}" data-key="amountCompare">＋ 增加条件</button></div>`;
    return h;
  }
  return h;
}

function renderSettings() {
  if (!activeSchemeTab || !schemes.find(s => s.id === activeSchemeTab)) {
    activeSchemeTab = schemes[0]?.id;
  }
  let html = `<div class="settings-modal"><div class="settings-header"><span class="settings-title">⚙️ 策略</span><button class="settings-back-btn" id="settingsBackBtn" style="margin-left:auto;">✕</button></div>`;
  // Tab 栏
  html += `<div class="scheme-tab-bar">`;
  for (const st of schemes) {
    const cls = st.id === activeSchemeTab ? 'scheme-tab active' : 'scheme-tab';
    html += `<button class="${cls}" data-id="${st.id}">${esc(st.name)}</button>`;
  }
  html += `<button class="scheme-tab-add" title="新建空白策略">＋</button>`;
  html += `<select class="scheme-from-tpl-btn" id="schemeFromTplBtn"><option value="">从模板…</option>`;
  for (const t of SCHEME_TEMPLATES) { html += `<option value="builtin:${t.id}">${t.name}</option>`; }
  html += `</select>`;
  html += `</div>`;
  html += `<div class="settings-scroll">`;
  const s = schemes.find(x => x.id === activeSchemeTab);
  if (s) {
    html += `<div class="scheme-card" data-id="${s.id}"><div class="scheme-card-head">`;
    html += `<input class="scheme-name-input" value="${esc(s.name)}" data-id="${s.id}" style="flex:1;min-width:0;" />`;
    // 保存
    html += `<button class="scheme-save-btn" data-id="${s.id}" style="background:rgba(34,197,94,0.1);border:1px solid #22c55e;color:#22c55e;font-size:11px;padding:2px 8px;border-radius:5px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:3px;">${svgIcon('save', 12)} 保存</button>`;
    // 删除（仅多于1个方案时显示）
    if (schemes.length > 1) {
      html += `<button class="scheme-delete-btn" data-id="${s.id}" title="删除此方案" style="background:none;border:none;color:var(--muted);font-size:14px;padding:2px 4px;border-radius:4px;cursor:pointer;">${svgIcon('trash', 13)}</button>`;
    }
    html += `</div>`;

    // 按分组渲染条件
    const COMPLEX_KEYS = new Set(['breakGolden','cupHandle','bollingerUp','bollingerDown','priceCompare','amountCompare']);
    for (const group of CONDITION_GROUPS) {
      const groupDefs = group.keys.map(k => CONDITION_DEFS.find(d => d.key === k)).filter(Boolean);
      const enabledCount = groupDefs.filter(d => (s.conditions[d.key] || {}).enabled).length;

      html += `<div class="cond-group">`;
      html += `<div class="cond-group-header" data-group="${group.label}">`;
      html += `<span class="arrow">▾</span>`;
      html += `<span>${group.label}</span>`;
      if (enabledCount > 0) html += `<span class="group-count">${enabledCount} 项已启用</span>`;
      html += `</div>`;
      html += `<div class="cond-group-body">`;

      // Ashare 警告（合并显示一次）
      if (group.hasAshareWarning && appConfig.ashareEnabled !== false) {
        const ashareKeys = group.keys.filter(k => ['amountHigh','amountLow','amountMultiple','amountCompare'].includes(k));
        if (ashareKeys.length > 0) {
          html += `<div class="ashare-warning">⚠ Ashare 备用源无成交额数据，相关条件在 Ashare 模式下不会触发</div>`;
        }
      }

      let inGrid = false;
      for (const def of groupDefs) {
        const cond = s.conditions[def.key] || {};
        const checked = cond.enabled ? 'checked' : '';
        const stateClass = cond.enabled ? 'enabled' : 'disabled';
        const isComplex = COMPLEX_KEYS.has(def.key);

        if (!isComplex && !inGrid) { html += '<div class="conditions-grid">'; inGrid = true; }
        if (isComplex && inGrid) { html += '</div>'; inGrid = false; }

        html += `<div class="condition-row ${stateClass}${isComplex ? ' full-width' : ''}">`;
        html += `<input type="checkbox" class="cond-check" data-scheme="${s.id}" data-key="${def.key}" ${checked} />`;
        html += `<span class="cond-label">${def.label}</span>`;

        const inputHtml = renderConditionInputs(def, cond, s.id);
        html += inputHtml;

        // 复杂条件自行关闭 div，简单条件在此关闭
        if (!['bollingerUp','bollingerDown','cupHandle','priceCompare','amountCompare'].includes(def.key)) {
          html += `</div>`;
        }
      }
      if (inGrid) html += '</div>';
      html += `</div></div>`; // close cond-group-body + cond-group
    }

    html += `</div>`; // close scheme-card
  }
  html += `</div>`; // close settings-scroll
  html += `</div>`; // close settings-modal
  // Note: innerHTML is used here with escaped user input (esc() function)
  // All dynamic values are either scheme IDs (generated), numbers, or escaped strings
  settingsPanel.innerHTML = html;
  bindSettingsEvents();
}

/* 渲染右侧下半情绪区（完整版） */
function renderRightSentiment(data) {
  const el = document.getElementById('rightSentiment');
  if (!el || !data) return;
  if (data.error) { console.error('[情绪] 后端错误:', data.error); return; }

  const updatedAt = data.updated_at || '';
  const indexSrc = data.index_source || '';
  const breadthSrc = data.breadth_source || '';
  const sectorSrc = data.sector_source || '';
  const srcTag = (src, t) =>
    `<span style="font-size:9px;color:var(--muted);font-weight:400;margin-left:auto;">${esc(src)}${t ? ' · ' + t : ''}</span>`;

  // ── 1. 沪深指数 + 支撑/压力位 + 冰点/热度 ──
  const indices = data.indices || [];
  const klines = data.sh_klines || [];
  let idxHtml = '';
  if (indices.length) {
    idxHtml += `<div style="display:grid;grid-template-columns:repeat(${Math.min(indices.length,3)},1fr);gap:5px;margin-bottom:6px;">`;
    for (const item of indices) {
      const sign = item.change >= 0 ? '+' : '';
      const color = item.change >= 0 ? 'var(--green)' : 'var(--red)';
      idxHtml += `<div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:6px 8px;min-width:0;">
        <div style="font-size:10px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(item.name)}</div>
        <div style="font-size:14px;font-weight:800;letter-spacing:-0.02em;">${item.price.toFixed(2)}</div>
        <div style="font-size:11px;font-weight:700;color:${color};margin-top:1px;">${sign}${item.change.toFixed(2)}%</div>
      </div>`;
    }
    idxHtml += `</div>`;
  }

  if (klines.length >= 20) {
    const closes = klines.map(k => k.close);
    const highs  = klines.map(k => k.high);
    const lows   = klines.map(k => k.low);
    const last   = closes[closes.length - 1];
    const ma = (arr, n) => arr.slice(-n).reduce((a,b)=>a+b,0)/n;
    const ma5  = ma(closes, 5);
    const ma10 = ma(closes, 10);
    const ma20 = ma(closes, 20);
    const ma60 = klines.length >= 60 ? ma(closes, 60) : null;
    const sma20 = ma20;
    const std20 = Math.sqrt(closes.slice(-20).reduce((s,v)=>s+(v-sma20)**2,0)/20);
    const boll_upper = sma20 + 2*std20;
    const boll_lower = sma20 - 2*std20;
    const high20 = Math.max(...highs.slice(-20));
    const low20  = Math.min(...lows.slice(-20));
    const levels = [
      { label:'五日均线', val:ma5 }, { label:'十日均线', val:ma10 }, { label:'二十日均线', val:ma20 },
      ...(ma60 ? [{ label:'六十日均线', val:ma60 }] : []),
      { label:'布林上轨', val:boll_upper }, { label:'布林下轨', val:boll_lower },
      { label:'二十日高点', val:high20 }, { label:'二十日低点', val:low20 },
    ].filter(l => Math.abs(l.val - last) / last < 0.15);
    const resists = levels.filter(l => l.val > last).sort((a,b)=>a.val-b.val).slice(0,2);
    const supports = levels.filter(l => l.val <= last).sort((a,b)=>b.val-a.val).slice(0,2);

    function levelStrength(lev, allLevels, last) {
      let score = 0;
      if (lev.label.includes('六十日均线')) score += 4;
      else if (lev.label.includes('二十日均线') || lev.label.includes('二十日高点') || lev.label.includes('二十日低点')) score += 3;
      else if (lev.label.includes('十日均线')) score += 2;
      else if (lev.label.includes('五日均线')) score += 1;
      else if (lev.label.includes('布林')) score += 2;
      const touchZone = lev.val * 0.008;
      let touchCount = 0;
      for (let i = 0; i < closes.length - 1; i++) {
        const h = highs[i], l = lows[i];
        if (lev.val > last) { if (h >= lev.val - touchZone && closes[i] < lev.val) touchCount++; }
        else { if (l <= lev.val + touchZone && closes[i] > lev.val) touchCount++; }
      }
      if (touchCount >= 4) score += 3;
      else if (touchCount >= 2) score += 2;
      else if (touchCount >= 1) score += 1;
      const overlap = allLevels.filter(x => x !== lev && Math.abs(x.val - lev.val) / lev.val < 0.008).length;
      score += Math.min(overlap, 2);
      const dist = Math.abs(lev.val - last) / last;
      if (dist < 0.01) score += 1;
      else if (dist > 0.05) score -= 1;
      return Math.max(1, Math.min(10, score));
    }
    function strengthColor(s) { return s >= 8 ? '#ef4444' : s >= 6 ? '#f97316' : s >= 4 ? '#f59e0b' : '#6b7280'; }
    function strengthDots(s) { return '●'.repeat(Math.min(s, 5)) + '○'.repeat(Math.max(0, 5 - Math.min(s, 5))); }

    const CN_NUM = ['一','二','三'];
    idxHtml += `<div style="display:flex;gap:6px;margin-top:2px;margin-bottom:4px;">`;
    // 左列：支撑
    idxHtml += `<div style="flex:1;display:flex;flex-direction:column;gap:3px;">`;
    supports.forEach((s, i) => {
      const str = levelStrength(s, levels, last);
      const sc = strengthColor(str);
      idxHtml += `<div style="display:flex;align-items:center;gap:3px;font-size:10px;">
        <span style="color:var(--muted);white-space:nowrap;">支撑${CN_NUM[i]}</span>
        <span style="font-weight:700;color:#4ade80;">${s.val.toFixed(2)}</span>
        <span style="color:var(--muted);font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${esc(s.label)}</span>
        <span style="color:${sc};font-size:9px;flex-shrink:0;">${str}</span>
      </div>`;
    });
    if (!supports.length) idxHtml += `<div style="font-size:10px;color:var(--muted);">无近位支撑</div>`;
    idxHtml += `</div>`;
    // 右列：压力
    idxHtml += `<div style="flex:1;display:flex;flex-direction:column;gap:3px;">`;
    resists.forEach((r, i) => {
      const str = levelStrength(r, levels, last);
      const sc = strengthColor(str);
      idxHtml += `<div style="display:flex;align-items:center;gap:3px;font-size:10px;">
        <span style="color:var(--muted);white-space:nowrap;">压力${CN_NUM[i]}</span>
        <span style="font-weight:700;color:#f87171;">${r.val.toFixed(2)}</span>
        <span style="color:var(--muted);font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${esc(r.label)}</span>
        <span style="color:${sc};font-size:9px;flex-shrink:0;">${str}</span>
      </div>`;
    });
    if (!resists.length) idxHtml += `<div style="font-size:10px;color:var(--muted);">无近位压力</div>`;
    idxHtml += `</div>`;
    idxHtml += `</div>`;

    // 冰点/情绪高点
    let icepointScore = 0, hotScore = 0;
    const icepointReasons = [], hotReasons = [];
    if (last <= boll_lower * 1.01) { icepointScore++; icepointReasons.push('触及布林下轨'); }
    if (last <= low20 * 1.02) { icepointScore++; icepointReasons.push('接近20日低点'); }
    if (ma5 < ma10 && ma10 < ma20) { icepointScore++; icepointReasons.push('均线空头排列'); }
    if (closes.length >= 4) {
      const last3 = closes.slice(-4);
      if (last3[1] < last3[0] && last3[2] < last3[1] && last3[3] < last3[2]) { icepointScore++; icepointReasons.push('连续3日下跌'); }
    }
    let rsiVal = 50;
    if (closes.length >= 15) {
      const gains = [], losses = [];
      for (let i = closes.length - 14; i < closes.length; i++) {
        const diff = closes[i] - closes[i-1];
        gains.push(diff > 0 ? diff : 0);
        losses.push(diff < 0 ? -diff : 0);
      }
      const avgGain = gains.reduce((a,b)=>a+b,0)/14;
      const avgLoss = losses.reduce((a,b)=>a+b,0)/14;
      rsiVal = avgLoss === 0 ? 100 : 100 - 100/(1 + avgGain/avgLoss);
      if (rsiVal < 30) { icepointScore++; icepointReasons.push(`RSI超卖(${rsiVal.toFixed(0)})`); }
    }
    if (last >= boll_upper * 0.99) { hotScore++; hotReasons.push('触及布林上轨'); }
    if (last >= high20 * 0.98) { hotScore++; hotReasons.push('接近20日高点'); }
    if (ma5 > ma10 && ma10 > ma20) { hotScore++; hotReasons.push('均线多头排列'); }
    if (closes.length >= 4) {
      const last3 = closes.slice(-4);
      if (last3[1] > last3[0] && last3[2] > last3[1] && last3[3] > last3[2]) { hotScore++; hotReasons.push('连续3日上涨'); }
    }
    if (rsiVal > 70) { hotScore++; hotReasons.push(`RSI超买(${rsiVal.toFixed(0)})`); }

    const iceLeft = 5 - icepointScore;
    const hotLeft = 5 - hotScore;
    if (icepointScore >= 3) {
      idxHtml += `<div style="margin-top:4px;padding:4px 8px;background:rgba(99,102,241,0.15);border-left:2px solid #818cf8;border-radius:3px;font-size:10px;color:#a5b4fc;">
        ❄️ 冰点信号 ${icepointScore}/5（还差${iceLeft}分满冰点）：${icepointReasons.join('、')}
      </div>`;
    } else if (hotScore >= 3) {
      idxHtml += `<div style="margin-top:4px;padding:4px 8px;background:rgba(239,68,68,0.12);border-left:2px solid #ef4444;border-radius:3px;font-size:10px;color:#fca5a5;">
        🔥 情绪高点 ${hotScore}/5（还差${hotLeft}分满高点）：${hotReasons.join('、')}
      </div>`;
    } else {
      if (icepointScore >= hotScore) {
        idxHtml += `<div style="margin-top:4px;font-size:10px;color:var(--muted);">❄️ 距冰点还差 ${iceLeft} 分（当前 ${icepointScore}/5）：${icepointReasons.join('、') || '无明显信号'}</div>`;
      } else {
        idxHtml += `<div style="margin-top:4px;font-size:10px;color:var(--muted);">🔥 距情绪高点还差 ${hotLeft} 分（当前 ${hotScore}/5）：${hotReasons.join('、') || '无明显信号'}</div>`;
      }
    }
  }

  // ── 2. 市场宽度 ──
  const b = data.breadth || {};
  let breadthHtml = '';
  if (b.total) {
    const up = b.up||0, down = b.down||0, flat = b.flat||0;
    const limitUp = b.limit_up||0, limitDown = b.limit_down||0;
    const total = b.total||1;
    const upPct = (up/total*100).toFixed(0);
    const downPct = (down/total*100).toFixed(0);
    const limitRatio = (limitUp+limitDown) > 0 ? limitUp/(limitUp+limitDown)*100 : 0;
    const score = Math.min(100, up/total*100);
    const meterColor = score>60?'#ef4444':score>40?'#f59e0b':'#22c55e';
    breadthHtml = `
      <div class="breadth-row">
        <span class="breadth-num up">↑${up}</span>
        <div class="breadth-bar">
          <div class="breadth-fill-up" style="width:${upPct}%"></div>
          <div class="breadth-fill-down" style="width:${downPct}%"></div>
        </div>
        <span class="breadth-num down">↓${down}</span>
      </div>
      <div class="limit-row">
        <span class="limit-badge up">🔴 涨停 ${limitUp}</span>
        <span class="limit-badge down">🟢 跌停 ${limitDown}</span>
        <span style="font-size:10px;color:var(--muted);margin-left:auto;">平盘 ${flat}</span>
      </div>
      <div style="margin-top:6px;display:flex;gap:8px;">
        <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:10px;color:var(--muted);font-weight:600;">市场情绪</span>
            <span style="font-size:10px;font-weight:700;color:${meterColor}">${score.toFixed(0)}</span>
          </div>
          <div class="meter-bar"><div class="meter-fill" style="width:${score.toFixed(0)}%;background:${meterColor}"></div></div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:10px;color:var(--muted);font-weight:600;">涨停比</span>
            <span style="font-size:10px;font-weight:700;color:#fca5a5">${limitUp}/${limitUp+limitDown}</span>
          </div>
          <div class="meter-bar"><div class="meter-fill" style="width:${limitRatio.toFixed(0)}%;background:#ef4444"></div></div>
        </div>
      </div>`;
  }

  // ── 3. 板块排名（可点击展开） ──
  const sectors = (data.sectors || []).slice(0, 7);
  let sectorHtml = '';
  if (sectors.length) {
    sectorHtml = sectors.map((s, i) => {
      const isLimit = s.isLimitCount;
      const cls = isLimit ? 'up' : (s.change >= 0 ? 'up' : 'down');
      const changeText = isLimit ? `涨停${s.change}只` : `${s.change >= 0 ? '+' : ''}${typeof s.change === 'number' && s.change.toFixed ? s.change.toFixed(2) : s.change}%`;
      const sectorKey = `sector_${i}`;
      return `<div class="sector-row" data-sector-key="${sectorKey}" data-sector-name="${esc(s.name)}" style="cursor:pointer;user-select:none;">
        <span class="sector-rank">${i+1}</span>
        <span class="sector-name">${esc(s.name)}</span>
        <span style="color:var(--muted);font-size:10px;margin-left:2px;">${s.leader ? esc(s.leader) : ''}</span>
        <span class="sector-change ${cls}" style="margin-left:auto;">${changeText}</span>
        <span class="sector-expand-arrow" style="color:var(--muted);font-size:10px;margin-left:4px;">▶</span>
      </div>
      <div class="sector-stocks" id="stocks_${sectorKey}" style="display:none;padding:2px 0 4px 16px;"></div>`;
    }).join('');
  }

  // ── 4. 历史板块 ──
  const history = data.history || [];
  let historyHtml = '';
  if (history.length) {
    historyHtml = history.map(day => `
      <div class="history-day">
        <div class="history-day-label">${day.date}</div>
        <div class="history-sectors">
          ${day.top5.map((s,i) => `<span class="history-sector-tag rank${i+1}">${esc(s.name)} ${s.change>=0?'+':''}${s.change.toFixed(2)}%</span>`).join('')}
        </div>
      </div>`).join('');
  } else {
    historyHtml = '<div style="color:var(--muted);font-size:10px;">历史数据暂不可用</div>';
  }

  el.innerHTML = `
    <div style="display:flex;justify-content:flex-end;padding:2px 0 4px;">
      <button class="header-btn" id="sentimentRefreshBtn" title="刷新情绪数据" style="width:22px;height:22px;font-size:11px;">↻</button>
    </div>
    <div class="sent-section">
      <div class="sent-section-title" style="display:flex;align-items:center;">沪深指数${srcTag(indexSrc, updatedAt)}</div>
      ${idxHtml || '<div style="color:var(--muted);font-size:10px;">获取失败（TDX 未连接且东财 fallback 异常）</div>'}
    </div>
    <div class="sent-section">
      <div class="sent-section-title" style="display:flex;align-items:center;">🌡️ 市场宽度${srcTag(breadthSrc, updatedAt)}</div>
      ${breadthHtml || '<div style="color:var(--muted);font-size:10px;">获取失败（东财接口异常）</div>'}
    </div>
    <div class="sent-section">
      <div class="sent-section-title" style="display:flex;align-items:center;">🔥 题材涨停排名${srcTag(sectorSrc, updatedAt)}</div>
      ${sectorHtml || '<div style="color:var(--muted);font-size:10px;">暂无数据（非交易时段或数据源未配置）</div>'}
    </div>
    <div class="sent-section">
      <div class="sent-section-title" style="display:flex;align-items:center;">📅 近7日板块热力${srcTag('', updatedAt)}</div>
      ${historyHtml}
    </div>
  `;
  bindSentimentRefreshBtn();

  // 绑定板块展开事件
  el.querySelectorAll('.sector-row').forEach(row => {
    row.addEventListener('click', () => {
      const key = row.dataset.sectorKey;
      const name = row.dataset.sectorName;
      const stocksDiv = document.getElementById(`stocks_${key}`);
      const arrow = row.querySelector('.sector-expand-arrow');
      if (!stocksDiv) return;
      const isOpen = stocksDiv.style.display !== 'none';
      if (isOpen) {
        stocksDiv.style.display = 'none';
        if (arrow) arrow.textContent = '▶';
      } else {
        stocksDiv.style.display = 'block';
        if (arrow) arrow.textContent = '▼';
        if (stocksDiv.innerHTML) return;
        stocksDiv.innerHTML = '<div style="color:var(--muted);font-size:10px;">加载中…</div>';
        fetchSectorTopStocks(name, stocksDiv);
      }
    });
  });
}

/* 通过 WS 请求板块前5只股票 */
function fetchSectorTopStocks(sectorName, stocksDiv) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'get_sector_stocks', sector_name: sectorName }));
  } else {
    if (stocksDiv) stocksDiv.innerHTML = '<div style="color:var(--muted);font-size:10px;">未连接引擎</div>';
  }
}

function bindSettingsEvents() {
  const closeSettings = () => { settingsOpen = false; settingsPanel.classList.remove('active'); };
  document.getElementById('settingsBackBtn')?.addEventListener('click', closeSettings);
  settingsPanel.addEventListener('click', (e) => { if (e.target === settingsPanel) closeSettings(); });
  settingsPanel.querySelectorAll('.scheme-save-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      saveSchemes();
      btn.textContent = '✅ 已保存';
      btn.style.background = 'rgba(34,197,94,0.2)';
      setTimeout(() => { btn.innerHTML = `${svgIcon('save', 12)} 保存`; btn.style.background = 'rgba(34,197,94,0.1)'; }, 1200);
    });
  });
  settingsPanel.querySelectorAll('.scheme-name-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const sc = schemes.find(x => x.id === inp.dataset.id);
      if (sc) {
        sc.name = inp.value.trim() || '未命名';
        saveSchemes(); renderSchemeBar();
        const tab = settingsPanel.querySelector(`.scheme-tab[data-id="${sc.id}"]`);
        if (tab) tab.textContent = sc.name;
      }
    });
  });
  // ── 删除方案（底部按钮，二次确认）──
  settingsPanel.querySelectorAll('.scheme-delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (schemes.length <= 1) return;
      if (btn.dataset.confirming === 'true') {
        // 第二次点击：真正删除
        const idx = schemes.findIndex(x => x.id === btn.dataset.id);
        if (idx >= 0) schemes.splice(idx, 1);
        if (activeSchemeTab === btn.dataset.id) activeSchemeTab = schemes[0]?.id;
        saveSchemes(); renderSettings(); renderSchemeBar();
      } else {
        // 第一次点击：进入确认状态
        btn.dataset.confirming = 'true';
        btn.textContent = '确认删除？';
        btn.style.color = '#ef4444';
        btn.style.borderColor = '#ef4444';
        setTimeout(() => {
          btn.dataset.confirming = '';
          btn.innerHTML = svgIcon('trash', 13) + ' 删除此方案';
          btn.style.color = '';
          btn.style.borderColor = '';
        }, 3000);
      }
    });
  });
  // ── 条件 checkbox（更新启用/禁用状态样式）──
  settingsPanel.querySelectorAll('.cond-check').forEach(cb => {
    cb.addEventListener('change', () => {
      const sc = schemes.find(x => x.id === cb.dataset.scheme);
      if (sc && sc.conditions[cb.dataset.key]) {
        sc.conditions[cb.dataset.key].enabled = cb.checked;
        saveSchemes();
        // 更新行样式
        const row = cb.closest('.condition-row');
        if (row) {
          row.classList.toggle('enabled', cb.checked);
          row.classList.toggle('disabled', !cb.checked);
        }
        // 更新分组启用计数
        renderSettings();
      }
    });
  });
  settingsPanel.querySelectorAll('.cond-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const sc = schemes.find(x => x.id === inp.dataset.scheme);
      if (sc && sc.conditions[inp.dataset.key]) {
        const val = inp.tagName === 'SELECT' ? inp.value : (parseFloat(inp.value) || 0);
        sc.conditions[inp.dataset.key][inp.dataset.field] = val;
        saveSchemes();
      }
    });
  });
  // ── 分组折叠 ──
  settingsPanel.querySelectorAll('.cond-group-header').forEach(header => {
    header.addEventListener('click', () => {
      const body = header.nextElementSibling;
      const arrow = header.querySelector('.arrow');
      if (body) body.classList.toggle('collapsed');
      if (arrow) arrow.classList.toggle('collapsed');
    });
  });
  // ── 价格组合比较：动态行事件 ──
  settingsPanel.querySelectorAll('.pc-add-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sc = schemes.find(x => x.id === btn.dataset.scheme);
      if (!sc) return;
      if (!sc.conditions.priceCompare) sc.conditions.priceCompare = { enabled: false, rules: [] };
      if (!sc.conditions.priceCompare.rules) sc.conditions.priceCompare.rules = [{ dayL:1, fieldL:'close', op:'gt', dayR:2, fieldR:'close' }];
      sc.conditions.priceCompare.rules.push({ dayL:1, fieldL:'close', op:'gt', dayR:2, fieldR:'close' });
      saveSchemes(); renderSettings();
    });
  });
  settingsPanel.querySelectorAll('.pc-del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sc = schemes.find(x => x.id === btn.dataset.scheme);
      if (!sc || !sc.conditions.priceCompare || !sc.conditions.priceCompare.rules) return;
      const ri = parseInt(btn.dataset.ri);
      sc.conditions.priceCompare.rules.splice(ri, 1);
      saveSchemes(); renderSettings();
    });
  });
  settingsPanel.querySelectorAll('.pc-rule .pc-field').forEach(inp => {
    inp.addEventListener('change', () => {
      const row = inp.closest('.pc-rule');
      if (!row) return;
      const sc = schemes.find(x => x.id === row.dataset.scheme);
      if (!sc || !sc.conditions.priceCompare || !sc.conditions.priceCompare.rules) return;
      const ri = parseInt(row.dataset.ri);
      const rule = sc.conditions.priceCompare.rules[ri];
      if (!rule) return;
      const f = inp.dataset.f;
      if (f === 'multiplier') {
        const v = parseFloat(inp.value);
        if (isNaN(v) || inp.value.trim() === '') { delete rule.multiplier; } else { rule.multiplier = v; }
      } else {
        rule[f] = inp.tagName === 'SELECT' ? inp.value : (parseInt(inp.value) || 1);
      }
      saveSchemes();
    });
  });

  // ── 成交额组合比较：动态行事件 ──
  settingsPanel.querySelectorAll('.ac-add-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sc = schemes.find(x => x.id === btn.dataset.scheme);
      if (!sc) return;
      if (!sc.conditions.amountCompare) sc.conditions.amountCompare = { enabled: false, rules: [] };
      if (!sc.conditions.amountCompare.rules) sc.conditions.amountCompare.rules = [{ dayL:1, op:'gt', dayR:2 }];
      sc.conditions.amountCompare.rules.push({ dayL:1, op:'gt', dayR:2 });
      saveSchemes(); renderSettings();
    });
  });
  settingsPanel.querySelectorAll('.ac-del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sc = schemes.find(x => x.id === btn.dataset.scheme);
      if (!sc || !sc.conditions.amountCompare || !sc.conditions.amountCompare.rules) return;
      const ri = parseInt(btn.dataset.ri);
      sc.conditions.amountCompare.rules.splice(ri, 1);
      saveSchemes(); renderSettings();
    });
  });
  settingsPanel.querySelectorAll('.ac-rule .ac-field').forEach(inp => {
    inp.addEventListener('change', () => {
      const row = inp.closest('.ac-rule');
      if (!row) return;
      const sc = schemes.find(x => x.id === row.dataset.scheme);
      if (!sc || !sc.conditions.amountCompare || !sc.conditions.amountCompare.rules) return;
      const ri = parseInt(row.dataset.ri);
      const rule = sc.conditions.amountCompare.rules[ri];
      if (!rule) return;
      const f = inp.dataset.f;
      if (f === 'multiplier') {
        const v = parseFloat(inp.value);
        if (isNaN(v) || inp.value.trim() === '') { delete rule.multiplier; } else { rule.multiplier = v; }
      } else {
        rule[f] = inp.tagName === 'SELECT' ? inp.value : (parseInt(inp.value) || 1);
      }
      saveSchemes();
    });
  });

  // ── 布林线动态行事件（bollingerUp=bu, bollingerDown=bd）──
  for (const prefix of ['bu', 'bd']) {
    const condKey = prefix === 'bu' ? 'bollingerUp' : 'bollingerDown';
    const defaultBand = prefix === 'bu' ? 'upper' : 'lower';
    settingsPanel.querySelectorAll(`.${prefix}-add-btn`).forEach(btn => {
      btn.addEventListener('click', () => {
        const sc = schemes.find(x => x.id === btn.dataset.scheme);
        if (!sc) return;
        if (!sc.conditions[condKey]) sc.conditions[condKey] = { enabled: false, rules: [] };
        if (!sc.conditions[condKey].rules) sc.conditions[condKey].rules = [{ band: defaultBand, period: '20d' }];
        sc.conditions[condKey].rules.push({ band: defaultBand, period: '20d' });
        saveSchemes(); renderSettings();
      });
    });
    settingsPanel.querySelectorAll(`.${prefix}-del-btn`).forEach(btn => {
      btn.addEventListener('click', () => {
        const sc = schemes.find(x => x.id === btn.dataset.scheme);
        if (!sc || !sc.conditions[condKey] || !sc.conditions[condKey].rules) return;
        sc.conditions[condKey].rules.splice(parseInt(btn.dataset.ri), 1);
        saveSchemes(); renderSettings();
      });
    });
    settingsPanel.querySelectorAll(`.${prefix}-rule .${prefix}-field`).forEach(inp => {
      inp.addEventListener('change', () => {
        const row = inp.closest(`.${prefix}-rule`);
        if (!row) return;
        const sc = schemes.find(x => x.id === row.dataset.scheme);
        if (!sc || !sc.conditions[condKey] || !sc.conditions[condKey].rules) return;
        const rule = sc.conditions[condKey].rules[parseInt(row.dataset.ri)];
        if (!rule) return;
        rule[inp.dataset.f] = inp.value;
        saveSchemes();
      });
    });
  }

  // ── 策略 Tab 切换 ──
  settingsPanel.querySelectorAll('.scheme-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeSchemeTab = tab.dataset.id;
      renderSettings();
    });
  });
  // ── Tab 栏 + 新建策略 ──
  settingsPanel.querySelector('.scheme-tab-add')?.addEventListener('click', () => {
    const newScheme = { id: 'scheme_' + Date.now(), name: `方案${schemes.length + 1}`, enabled: true,
      conditions: { marketCap:{enabled:false,min:20,max:200}, bigOrder:{enabled:false,ratio:0.1}, amountHigh:{enabled:false,days:5}, amountLow:{enabled:false,days:5}, limitUp:{enabled:false}, limitDown:{enabled:false}, shortRise:{enabled:false,seconds:60,percent:3}, breakMinMA:{enabled:false,minutes:5}, breakDayMA:{enabled:false,period:5}, breakGolden:{enabled:false,days:20,ratio:0.382,mode:'cross'}, amountMultiple:{enabled:false,multiple:2}, volumeRatio:{enabled:false,min:2}, bollingerUp:{enabled:false,rules:[{band:'upper',period:'20d'}]}, bollingerDown:{enabled:false,rules:[{band:'lower',period:'20d'}]}, cupHandle:{enabled:false,days:20,dayA:5,dayB:10,minPct:10,maxPct:30}, priceCompare:{enabled:false,rules:[{dayL:1,fieldL:'close',op:'gt',dayR:2,fieldR:'close'}]}, amountCompare:{enabled:false,rules:[{dayL:1,op:'gt',dayR:2}]} }
    };
    schemes.push(newScheme);
    activeSchemeTab = newScheme.id;
    saveSchemes(); renderSettings(); renderSchemeBar();
  });
  // ── 从模板创建策略 ──
  document.getElementById('schemeFromTplBtn')?.addEventListener('change', (e) => {
    const val = e.target.value;
    if (!val) return;
    e.target.value = '';
    if (val.startsWith('builtin:')) {
      const tplId = val.slice(8);
      const tpl = SCHEME_TEMPLATES.find(t => t.id === tplId);
      if (!tpl) return;
      const base = JSON.parse(JSON.stringify(schemes[0]?.conditions || DEFAULT_SCHEMES[0].conditions));
      for (const k in base) { if (base[k]) base[k].enabled = false; }
      for (const [k, v] of Object.entries(tpl.conditions)) { base[k] = { ...base[k], ...v }; }
      const newScheme = { id: 'scheme_' + Date.now(), name: tpl.name, enabled: true, conditions: base };
      schemes.push(newScheme);
      activeSchemeTab = newScheme.id;
      saveSchemes(); renderSettings(); renderSchemeBar();
    }
  });
}

/* ── 账户登录系统 ── */
function setAuthLoading(loading) {
  const loginBtn = document.getElementById('authLoginBtn');
  const regBtn = document.getElementById('authRegisterBtn');
  const uInput = document.getElementById('authUsername');
  const pInput = document.getElementById('authPassword');
  if (!loginBtn) return;
  loginBtn.disabled = loading;
  regBtn.disabled = loading;
  uInput.disabled = loading;
  pInput.disabled = loading;
  if (loading) {
    loginBtn.dataset.origText = loginBtn.textContent;
    loginBtn.textContent = '请稍候…';
  } else {
    loginBtn.textContent = loginBtn.dataset.origText || '登录';
  }
}

function handleAuthResult(d, isActiveLogin = false) {
  setAuthLoading(false);
  const errorEl = document.getElementById('authError');
  if (d.success) {
    if (d.user) {
      authUser = d.user;
      localStorage.setItem('stock-radar-auth-user', JSON.stringify(d.user));
    }
    if (d.token) {
      authToken = d.token;
      localStorage.setItem('stock-radar-auth-token', d.token);
    }
    // 自选股：主动登录时云端覆盖；token续登时取并集（保留本地新增）
    if (d.saved_watchlist !== undefined && d.saved_watchlist !== null) {
      if (isActiveLogin) {
        watchlist = d.saved_watchlist;
      } else {
        watchlist = [...new Set([...watchlist, ...d.saved_watchlist])];
      }
      localStorage.setItem('stock-radar-watchlist', JSON.stringify(watchlist));
    }
    // 方案：主动登录时以本地为准并推送到云端；token续登时以本地为准，并将本地推送到服务端
    if (d.saved_schemes !== undefined) {
      if (isActiveLogin && d.saved_schemes && d.saved_schemes.length > 0) {
        if (schemes && schemes.length > 0) {
          // 本地有方案：以本地为准，把本地推送到云端（修复云端旧数据）
          if (ws && ws.readyState === WebSocket.OPEN)
            ws.send(JSON.stringify({ action: 'sync_schemes', schemes }));
        } else {
          // 本地无方案：云端覆盖（首次登录或本地清空）
          schemes = d.saved_schemes;
          localStorage.setItem('stock-radar-schemes', JSON.stringify(schemes));
          renderSchemeBar();
          renderList();
        }
      } else if (!isActiveLogin) {
        // token续登（刷新页面）：本地为准，推送本地到服务端确保同步
        localStorage.setItem('stock-radar-schemes', JSON.stringify(schemes));
        if (ws && ws.readyState === WebSocket.OPEN && authUser) {
          ws.send(JSON.stringify({ action: 'sync_schemes', schemes }));
        }
        renderSchemeBar();
        renderList();
      } else {
        // 主动登录但云端无方案：把本地推上去
        if (ws && ws.readyState === WebSocket.OPEN)
          ws.send(JSON.stringify({ action: 'sync_schemes', schemes }));
      }
    }
    updateAuthUI();
    document.getElementById('authOverlay').style.display = 'none';
  } else {
    if (errorEl) errorEl.textContent = d.error || '操作失败';
    // token 过期时清除并重新弹出登录
    if (d.error && d.error.includes('过期')) {
      authToken = null;
      authUser = null;
      localStorage.removeItem('stock-radar-auth-token');
      localStorage.removeItem('stock-radar-auth-user');
      showAuthModal();
    }
  }
}

function updateAuthUI() {
  const btn = document.getElementById('authBtn');
  const label = document.getElementById('authUserLabel');
  const loginForm = document.getElementById('authLoginBtn')?.parentElement;
  const loggedIn = document.getElementById('authLoggedIn');
  if (authUser) {
    if (btn) btn.style.display = 'none';
    if (label) { label.style.display = 'inline'; label.textContent = authUser.username; }
    if (loginForm) {
      document.getElementById('authUsername').style.display = 'none';
      document.getElementById('authPassword').style.display = 'none';
      document.getElementById('authLoginBtn').style.display = 'none';
      document.getElementById('authRegisterBtn').style.display = 'none';
      document.getElementById('authError').style.display = 'none';
      document.getElementById('authModalTitle').textContent = '账户';
    }
    if (loggedIn) {
      loggedIn.style.display = 'block';
      document.getElementById('authLoggedName').textContent = authUser.username;
      const adminBtn = document.getElementById('authAdminBtn');
      if (adminBtn) adminBtn.style.display = authUser.is_admin ? 'block' : 'none';
      const adminHeaderBtn = document.getElementById('adminHeaderBtn');
      if (adminHeaderBtn) adminHeaderBtn.style.display = authUser.is_admin ? '' : 'none';
    }
  } else {
    if (btn) btn.style.display = '';
    if (label) label.style.display = 'none';
    if (loginForm) {
      document.getElementById('authUsername').style.display = '';
      document.getElementById('authPassword').style.display = '';
      document.getElementById('authLoginBtn').style.display = '';
      document.getElementById('authRegisterBtn').style.display = '';
      document.getElementById('authError').style.display = '';
      document.getElementById('authModalTitle').textContent = '登录';
    }
    if (loggedIn) loggedIn.style.display = 'none';
    const adminHeaderBtn2 = document.getElementById('adminHeaderBtn');
    if (adminHeaderBtn2) adminHeaderBtn2.style.display = 'none';
  }
}

function showAuthModal() {
  document.getElementById('authError').textContent = '';
  document.getElementById('authOverlay').style.display = 'flex';
  // 未登录时隐藏关闭按钮
  const closeBtn = document.getElementById('authCloseBtn');
  if (closeBtn) closeBtn.style.display = authUser ? '' : 'none';
  updateAuthUI();
}

// 登录按钮和用户名标签都打开模态框
document.getElementById('authBtn')?.addEventListener('click', showAuthModal);
document.getElementById('authUserLabel')?.addEventListener('click', showAuthModal);
document.getElementById('authCloseBtn')?.addEventListener('click', () => {
  if (!authUser) return; // 未登录不可关闭
  document.getElementById('authOverlay').style.display = 'none';
});
document.getElementById('authOverlay')?.addEventListener('click', (e) => {
  if (!authUser) return; // 未登录不可关闭
  if (e.target.id === 'authOverlay') document.getElementById('authOverlay').style.display = 'none';
});

document.getElementById('authLoginBtn')?.addEventListener('click', () => {
  const u = document.getElementById('authUsername').value.trim();
  const p = document.getElementById('authPassword').value;
  if (!u || !p) { document.getElementById('authError').textContent = '请填写用户名和密码'; return; }
  if (!ws || ws.readyState !== WebSocket.OPEN) { document.getElementById('authError').textContent = '正在连接服务器，请稍候...'; return; }
  setAuthLoading(true);
  ws.send(JSON.stringify({ action: 'login', username: u, password: p }));
});

document.getElementById('authRegisterBtn')?.addEventListener('click', () => {
  const u = document.getElementById('authUsername').value.trim();
  const p = document.getElementById('authPassword').value;
  if (!u || !p || p.length < 4) { document.getElementById('authError').textContent = '用户名不能为空，密码至少4位'; return; }
  if (!ws || ws.readyState !== WebSocket.OPEN) { document.getElementById('authError').textContent = '正在连接服务器，请稍候...'; return; }
  setAuthLoading(true);
  ws.send(JSON.stringify({ action: 'register', username: u, password: p }));
});

document.getElementById('authLogoutBtn')?.addEventListener('click', () => {
  authUser = null;
  authToken = null;
  localStorage.removeItem('stock-radar-auth-token');
  localStorage.removeItem('stock-radar-auth-user');
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'logout' }));
  }
  updateAuthUI();
  showAuthModal(); // 退出后重新弹出登录框
});

document.getElementById('authAdminBtn')?.addEventListener('click', () => {
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'flex';
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'admin_get_users' }));
  }
  document.getElementById('adminTabUsers').textContent = '加载中…';
});

document.getElementById('adminHeaderBtn')?.addEventListener('click', () => {
  document.getElementById('adminPanel').style.display = 'flex';
  if (ws && ws.readyState === WebSocket.OPEN) {

  row1.style.cssText = 'display:flex;gap:6px;margin-bottom:6px;';
  const tplNameInput = document.createElement('input');
  tplNameInput.id = 'tplName'; tplNameInput.placeholder = '模板名称';
  tplNameInput.style.cssText = 'flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 8px;font-size:11px;';
  const tplAuthorInput = document.createElement('input');
  tplAuthorInput.id = 'tplAuthor'; tplAuthorInput.placeholder = '作者';

  row1.appendChild(tplNameInput); row1.appendChild(tplAuthorInput);
  formDiv.appendChild(row1);

  const tplDescInput = document.createElement('input');
  tplDescInput.id = 'tplDesc'; tplDescInput.placeholder = '简短描述（选填）';
  tplDescInput.style.cssText = 'width:100%;box-sizing:border-box;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 8px;font-size:11px;margin-bottom:8px;';

  const saveBtn = document.createElement('button');
  saveBtn.id = 'tplSaveBtn';
  saveBtn.style.cssText = 'background:rgba(34,197,94,0.1);border:1px solid #22c55e;color:#22c55e;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:11px;font-weight:600;';
  saveBtn.textContent = '保存';
  btnRow.appendChild(cancelBtn); btnRow.appendChild(saveBtn);
  formDiv.appendChild(btnRow);
  el.appendChild(formDiv);

  // 模板列表表格
  const table = document.createElement('table');
  table.style.cssText = 'width:100%;border-collapse:collapse;';
  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  headRow.style.cssText = 'color:var(--muted);border-bottom:1px solid var(--border);';

    tr.appendChild(td); tbody.appendChild(tr);
  }
  for (const t of templates) {
    const tr = document.createElement('tr');
    tr.style.borderBottom = '1px solid rgba(255,255,255,0.04)';
    const tdName = document.createElement('td');
    tdName.style.cssText = 'padding:5px 6px;font-weight:600;';
    tdName.textContent = t.name;
    const tdAuthor = document.createElement('td');
    tdAuthor.style.cssText = 'padding:5px 6px;color:var(--muted);';
    tdAuthor.textContent = t.author || '—';
    const tdDesc = document.createElement('td');
    tdDesc.style.cssText = 'padding:5px 6px;color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
    tdDesc.textContent = t.description || '';
    const tdAct = document.createElement('td');
    tdAct.style.cssText = 'padding:5px 6px;text-align:right;white-space:nowrap;';
    const editBtn = document.createElement('button');
    editBtn.dataset.edit = t.id;
    editBtn.style.cssText = 'background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:2px 7px;cursor:pointer;font-size:10px;margin-right:4px;';
    editBtn.textContent = '编辑';
    const delBtn = document.createElement('button');
    delBtn.dataset.del = t.id;
    delBtn.style.cssText = 'background:none;border:1px solid rgba(239,68,68,0.3);color:#f87171;border-radius:4px;padding:2px 7px;cursor:pointer;font-size:10px;';
    delBtn.textContent = '删除';
    tdAct.appendChild(editBtn); tdAct.appendChild(delBtn);
    tr.appendChild(tdName); tr.appendChild(tdAuthor); tr.appendChild(tdDesc); tr.appendChild(tdAct);
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  el.appendChild(table);

  // 当前编辑的模板 ID（新建时为 null）
  let _editingTplId = null;
  let _editingConditions = {};

  function openForm(tpl) {
    _editingTplId = tpl ? tpl.id : null;
    _editingConditions = tpl ? JSON.parse(JSON.stringify(tpl.conditions_json || {})) : {};
    document.getElementById('tplName').value = tpl ? tpl.name : '';
    document.getElementById('tplAuthor').value = tpl ? (tpl.author || '') : '';
    document.getElementById('tplDesc').value = tpl ? (tpl.description || '') : '';
    const condEl = document.getElementById('tplCondEditor');
    while (condEl.firstChild) condEl.removeChild(condEl.firstChild);
    for (const group of CONDITION_GROUPS) {
      const groupDefs = group.keys.map(k => CONDITION_DEFS.find(d => d.key === k)).filter(Boolean);
      const groupDiv = document.createElement('div');
      groupDiv.style.cssText = 'margin-bottom:6px;';
      const groupLabel = document.createElement('div');
      groupLabel.style.cssText = 'font-size:10px;color:var(--muted);margin-bottom:3px;';
      groupLabel.textContent = group.label;
      groupDiv.appendChild(groupLabel);
      for (const def of groupDefs) {
        const cond = _editingConditions[def.key] || { enabled: false };
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:6px;padding:2px 0;';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = !!cond.enabled;
        cb.style.accentColor = 'var(--accent)';
        cb.addEventListener('change', () => {
          if (!_editingConditions[def.key]) _editingConditions[def.key] = {};
          _editingConditions[def.key].enabled = cb.checked;
        });
        const lbl = document.createElement('span');
        lbl.style.cssText = 'font-size:11px;color:var(--text);';
        lbl.textContent = def.label;
        row.appendChild(cb); row.appendChild(lbl);
        groupDiv.appendChild(row);
      }
      condEl.appendChild(groupDiv);
    }
    formDiv.style.display = '';
    table.style.display = 'none';
    addBtn.style.display = 'none';
  }

  addBtn.addEventListener('click', () => openForm(null));
  cancelBtn.addEventListener('click', () => {
    formDiv.style.display = 'none';
    table.style.display = '';
    addBtn.style.display = '';
  });
  saveBtn.addEventListener('click', () => {
    const name = document.getElementById('tplName').value.trim();
    if (!name) { alert('请输入模板名称'); return; }
    const tpl = {
      name,
      author: document.getElementById('tplAuthor').value.trim(),
      description: document.getElementById('tplDesc').value.trim(),
      conditions_json: _editingConditions,
    };
    if (_editingTplId) tpl.id = _editingTplId;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ action: 'admin_save_template', template: tpl }));
    }
    formDiv.style.display = 'none';
    table.style.display = '';
    addBtn.style.display = '';
  });

  tbody.addEventListener('click', (e) => {
    const editId = e.target.dataset.edit;
    const delId = e.target.dataset.del;
    if (editId) {
      const tpl = _adminTemplates.find(t => t.id === editId);
      if (tpl) openForm(tpl);
    }
    if (delId) {
      if (!confirm('确认删除此模板？')) return;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ action: 'admin_delete_template', template_id: delId }));
      }
    }
  });
}

// 渲染只读方案详情（复用方案编辑器组件）
function renderAdminSchemes(userSchemes) {
  const wrap = document.createElement('div');
  if (!userSchemes || !userSchemes.length) {
    wrap.textContent = '无方案';
    return wrap;
  }

  // 方案 Tab 栏（复用 scheme-tab 样式）
  const tabBar = document.createElement('div');
  tabBar.style.cssText = 'display:flex;gap:4px;margin-bottom:8px;';
  const panels = [];

  for (let i = 0; i < userSchemes.length; i++) {
    const s = userSchemes[i];
    const tab = document.createElement('button');
    tab.className = 'chart-mode-btn' + (i === 0 ? ' active' : '');
    tab.textContent = s.name || '未命名';
    tab.style.cssText = 'font-size:10px;padding:2px 8px;';

    const panel = document.createElement('div');
    panel.style.display = i === 0 ? '' : 'none';

    // 复用 CONDITION_GROUPS + CONDITION_DEFS 渲染只读方案
    const conditions = s.conditions || {};
    for (const group of CONDITION_GROUPS) {
      const groupDefs = group.keys.map(k => CONDITION_DEFS.find(d => d.key === k)).filter(Boolean);
      const enabledCount = groupDefs.filter(d => (conditions[d.key] || {}).enabled).length;
      if (enabledCount === 0) continue; // 跳过没有启用条件的分组

      const groupDiv = document.createElement('div');
      groupDiv.className = 'cond-group';
      const header = document.createElement('div');
      header.className = 'cond-group-header';
      header.innerHTML = `<span>${group.label}</span> <span class="group-count">${enabledCount} 项已启用</span>`;
      groupDiv.appendChild(header);

      const body = document.createElement('div');
      body.className = 'cond-group-body';
      body.style.display = '';

      for (const def of groupDefs) {
        const cond = conditions[def.key] || {};
        if (!cond.enabled) continue; // 只显示启用的条件
        const row = document.createElement('div');
        row.className = 'condition-row enabled';
        row.innerHTML = `<input type="checkbox" checked disabled style="accent-color:var(--accent);" />` +
          `<span class="cond-label">${def.label}</span>` +
          renderConditionInputs(def, cond, '__readonly__');
        // 禁用所有 input
        row.querySelectorAll('input,select').forEach(inp => { inp.disabled = true; });
        body.appendChild(row);
      }
      groupDiv.appendChild(body);
      panel.appendChild(groupDiv);
    }

    tab.addEventListener('click', () => {
      tabBar.querySelectorAll('.chart-mode-btn').forEach(b => b.classList.remove('active'));
      tab.classList.add('active');
      panels.forEach((p, j) => { p.style.display = j === i ? '' : 'none'; });
    });

    tabBar.appendChild(tab);
    panels.push(panel);
  }

  wrap.appendChild(tabBar);
  panels.forEach(p => wrap.appendChild(p));
  return wrap;
}

  </script>
</body>
</html>
