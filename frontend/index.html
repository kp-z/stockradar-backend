function renderRightSentiment(data) {
  const el = document.getElementById('rightSentiment');
  if (!el || !data) return;
  if (data.error) { console.error('[情绪] 后端错误:', data.error); return; }

  const updatedAt = data.updated_at || '';
  const indexSrc = data.index_source || '';
  const breadthSrc = data.breadth_source || '';
  const sectorSrc = data.sector_source || '';
  const srcTag = (src, t) =>
    `<span style="font-size:9px;color:var(--muted);font-weight:400;margin-left:auto;">${esc(src)}${t ? ' · ' + t : ''}</span>`;

  // ── 1. 沪深指数 + 支撑/压力位 + 冰点/热度 ──
  const indices = data.indices || [];
  const klines = data.sh_klines || [];
  let idxHtml = '';
  for (const item of indices) {
    const cls = item.change >= 0 ? 'up' : 'down';
    const sign = item.change >= 0 ? '+' : '';
    idxHtml += `<div style="display:flex;align-items:baseline;gap:6px;">
      <span style="font-size:11px;color:var(--muted);">${esc(item.name)}</span>
      <span style="font-size:14px;font-weight:800;">${item.price.toFixed(2)}</span>
      <span style="font-size:11px;font-weight:700;" class="sh-change ${cls}">${sign}${item.change.toFixed(2)}%</span>
    </div>`;
  }

  if (klines.length >= 20) {
    const closes = klines.map(k => k.close);
    const highs  = klines.map(k => k.high);
    const lows   = klines.map(k => k.low);
    const last   = closes[closes.length - 1];
    const ma = (arr, n) => arr.slice(-n).reduce((a,b)=>a+b,0)/n;
    const ma5  = ma(closes, 5);
    const ma10 = ma(closes, 10);
    const ma20 = ma(closes, 20);
    const ma60 = klines.length >= 60 ? ma(closes, 60) : null;
    const sma20 = ma20;
    const std20 = Math.sqrt(closes.slice(-20).reduce((s,v)=>s+(v-sma20)**2,0)/20);
    const boll_upper = sma20 + 2*std20;
    const boll_lower = sma20 - 2*std20;
    const high20 = Math.max(...highs.slice(-20));
    const low20  = Math.min(...lows.slice(-20));
    const levels = [
      { label:'五日均线', val:ma5 }, { label:'十日均线', val:ma10 }, { label:'二十日均线', val:ma20 },
      ...(ma60 ? [{ label:'六十日均线', val:ma60 }] : []),
      { label:'布林上轨', val:boll_upper }, { label:'布林下轨', val:boll_lower },
      { label:'二十日高点', val:high20 }, { label:'二十日低点', val:low20 },
    ].filter(l => Math.abs(l.val - last) / last < 0.15);
    const resists = levels.filter(l => l.val > last).sort((a,b)=>a.val-b.val).slice(0,2);
    const supports = levels.filter(l => l.val <= last).sort((a,b)=>b.val-a.val).slice(0,2);

    function levelStrength(lev, allLevels, last) {
      let score = 0;
      if (lev.label.includes('六十日均线')) score += 4;
      else if (lev.label.includes('二十日均线') || lev.label.includes('二十日高点') || lev.label.includes('二十日低点')) score += 3;
      else if (lev.label.includes('十日均线')) score += 2;
      else if (lev.label.includes('五日均线')) score += 1;
      else if (lev.label.includes('布林')) score += 2;
      const touchZone = lev.val * 0.008;
      let touchCount = 0;
      for (let i = 0; i < closes.length - 1; i++) {
        const h = highs[i], l = lows[i];
        if (lev.val > last) { if (h >= lev.val - touchZone && closes[i] < lev.val) touchCount++; }
        else { if (l <= lev.val + touchZone && closes[i] > lev.val) touchCount++; }
      }
      if (touchCount >= 4) score += 3;
      else if (touchCount >= 2) score += 2;
      else if (touchCount >= 1) score += 1;
      const overlap = allLevels.filter(x => x !== lev && Math.abs(x.val - lev.val) / lev.val < 0.008).length;
      score += Math.min(overlap, 2);
      const dist = Math.abs(lev.val - last) / last;
      if (dist < 0.01) score += 1;
      else if (dist > 0.05) score -= 1;
      return Math.max(1, Math.min(10, score));
    }
    function strengthColor(s) { return s >= 8 ? '#ef4444' : s >= 6 ? '#f97316' : s >= 4 ? '#f59e0b' : '#6b7280'; }
    function strengthDots(s) { return '●'.repeat(Math.min(s, 5)) + '○'.repeat(Math.max(0, 5 - Math.min(s, 5))); }

    const CN_NUM = ['一','二','三'];
    idxHtml += `<div style="margin-top:6px;font-size:11px;line-height:1.9;">`;
    supports.forEach((s, i) => {
      const str = levelStrength(s, levels, last);
      const sc = strengthColor(str);
      idxHtml += `<div style="color:#4ade80;display:flex;align-items:center;gap:4px;">
        <span>向下第${CN_NUM[i]}支撑位</span>
        <span style="font-weight:600;">${s.val.toFixed(2)}</span>
        <span style="color:var(--muted);font-size:10px;">(${esc(s.label)})</span>
        <span style="color:${sc};font-size:9px;letter-spacing:-1px;" title="强度${str}/10">${strengthDots(str)}</span>
        <span style="color:${sc};font-size:9px;">${str}</span>
      </div>`;
    });
    resists.forEach((r, i) => {
      const str = levelStrength(r, levels, last);
      const sc = strengthColor(str);
      idxHtml += `<div style="color:#f87171;display:flex;align-items:center;gap:4px;">
        <span>附近压力位${CN_NUM[i]}</span>
        <span style="font-weight:600;">${r.val.toFixed(2)}</span>
        <span style="color:var(--muted);font-size:10px;">(${esc(r.label)})</span>
        <span style="color:${sc};font-size:9px;letter-spacing:-1px;" title="强度${str}/10">${strengthDots(str)}</span>
        <span style="color:${sc};font-size:9px;">${str}</span>
      </div>`;
    });
    idxHtml += `</div>`;

    // 冰点/情绪高点
    let icepointScore = 0, hotScore = 0;
    const icepointReasons = [], hotReasons = [];
    if (last <= boll_lower * 1.01) { icepointScore++; icepointReasons.push('触及布林下轨'); }
    if (last <= low20 * 1.02) { icepointScore++; icepointReasons.push('接近20日低点'); }
    if (ma5 < ma10 && ma10 < ma20) { icepointScore++; icepointReasons.push('均线空头排列'); }
    if (closes.length >= 4) {
      const last3 = closes.slice(-4);
      if (last3[1] < last3[0] && last3[2] < last3[1] && last3[3] < last3[2]) { icepointScore++; icepointReasons.push('连续3日下跌'); }
    }
    let rsiVal = 50;
    if (closes.length >= 15) {
      const gains = [], losses = [];
      for (let i = closes.length - 14; i < closes.length; i++) {
        const diff = closes[i] - closes[i-1];
        gains.push(diff > 0 ? diff : 0);
        losses.push(diff < 0 ? -diff : 0);
      }
      const avgGain = gains.reduce((a,b)=>a+b,0)/14;
      const avgLoss = losses.reduce((a,b)=>a+b,0)/14;
      rsiVal = avgLoss === 0 ? 100 : 100 - 100/(1 + avgGain/avgLoss);
      if (rsiVal < 30) { icepointScore++; icepointReasons.push(`RSI超卖(${rsiVal.toFixed(0)})`); }
    }
    if (last >= boll_upper * 0.99) { hotScore++; hotReasons.push('触及布林上轨'); }
    if (last >= high20 * 0.98) { hotScore++; hotReasons.push('接近20日高点'); }
    if (ma5 > ma10 && ma10 > ma20) { hotScore++; hotReasons.push('均线多头排列'); }
    if (closes.length >= 4) {
      const last3 = closes.slice(-4);
      if (last3[1] > last3[0] && last3[2] > last3[1] && last3[3] > last3[2]) { hotScore++; hotReasons.push('连续3日上涨'); }
    }
    if (rsiVal > 70) { hotScore++; hotReasons.push(`RSI超买(${rsiVal.toFixed(0)})`); }

    const iceLeft = 5 - icepointScore;
    const hotLeft = 5 - hotScore;
    if (icepointScore >= 3) {
      idxHtml += `<div style="margin-top:5px;padding:4px 8px;background:rgba(99,102,241,0.15);border-left:2px solid #818cf8;border-radius:3px;font-size:10px;color:#a5b4fc;">
        ❄️ 冰点信号 ${icepointScore}/5（还差${iceLeft}分满冰点）：${icepointReasons.join('、')}
      </div>`;
    } else if (hotScore >= 3) {
      idxHtml += `<div style="margin-top:5px;padding:4px 8px;background:rgba(239,68,68,0.12);border-left:2px solid #ef4444;border-radius:3px;font-size:10px;color:#fca5a5;">
        🔥 情绪高点 ${hotScore}/5（还差${hotLeft}分满高点）：${hotReasons.join('、')}
      </div>`;
    } else {
      if (icepointScore >= hotScore) {
        idxHtml += `<div style="margin-top:5px;font-size:10px;color:var(--muted);">❄️ 距冰点还差 ${iceLeft} 分（当前 ${icepointScore}/5）：${icepointReasons.join('、') || '无明显信号'}</div>`;
      } else {
        idxHtml += `<div style="margin-top:5px;font-size:10px;color:var(--muted);">🔥 距情绪高点还差 ${hotLeft} 分（当前 ${hotScore}/5）：${hotReasons.join('、') || '无明显信号'}</div>`;
      }
    }
  }

  // ── 2. 市场宽度 ──
  const b = data.breadth || {};
  let breadthHtml = '';
  if (b.total) {
    const up = b.up||0, down = b.down||0, flat = b.flat||0;
    const limitUp = b.limit_up||0, limitDown = b.limit_down||0;
    const total = b.total||1;
    const upPct = (up/total*100).toFixed(0);
    const downPct = (down/total*100).toFixed(0);
    const limitRatio = (limitUp+limitDown) > 0 ? limitUp/(limitUp+limitDown)*100 : 0;
    const score = Math.min(100, up/total*100);
    const meterColor = score>60?'#ef4444':score>40?'#f59e0b':'#22c55e';
    breadthHtml = `
      <div class="breadth-row">
        <span class="breadth-num up">↑${up}</span>
        <div class="breadth-bar">
          <div class="breadth-fill-up" style="width:${upPct}%"></div>
          <div class="breadth-fill-down" style="width:${downPct}%"></div>
        </div>
        <span class="breadth-num down">↓${down}</span>
      </div>
      <div class="limit-row">
        <span class="limit-badge up">🔴 涨停 ${limitUp}</span>
        <span class="limit-badge down">🟢 跌停 ${limitDown}</span>
        <span style="font-size:10px;color:var(--muted);margin-left:auto;">平盘 ${flat}</span>
      </div>
      <div style="margin-top:6px;">
        <div class="sentiment-meter">
          <span class="meter-label">市场情绪</span>
          <div class="meter-bar"><div class="meter-fill" style="width:${score.toFixed(0)}%;background:${meterColor}"></div></div>
          <span class="meter-val" style="color:${meterColor}">${score.toFixed(0)}</span>
        </div>
        <div class="sentiment-meter">
          <span class="meter-label">涨停比</span>
          <div class="meter-bar"><div class="meter-fill" style="width:${limitRatio.toFixed(0)}%;background:#ef4444"></div></div>
          <span class="meter-val" style="color:#fca5a5">${limitUp}/${limitUp+limitDown}</span>
        </div>
      </div>`;
  }

  // ── 3. 板块排名（可点击展开） ──
  const sectors = (data.sectors || []).slice(0, 7);
  let sectorHtml = '';
  if (sectors.length) {
    sectorHtml = sectors.map((s, i) => {
      const isLimit = s.isLimitCount;
      const cls = isLimit ? 'up' : (s.change >= 0 ? 'up' : 'down');
      const changeText = isLimit ? `涨停${s.change}只` : `${s.change >= 0 ? '+' : ''}${typeof s.change === 'number' && s.change.toFixed ? s.change.toFixed(2) : s.change}%`;
      const sectorKey = `sector_${i}`;
      return `<div class="sector-row" data-sector-key="${sectorKey}" data-sector-name="${esc(s.name)}" style="cursor:pointer;user-select:none;">
        <span class="sector-rank">${i+1}</span>
        <span class="sector-name">${esc(s.name)}</span>
        <span style="color:var(--muted);font-size:10px;margin-left:2px;">${s.leader ? esc(s.leader) : ''}</span>
        <span class="sector-change ${cls}" style="margin-left:auto;">${changeText}</span>
        <span class="sector-expand-arrow" style="color:var(--muted);font-size:10px;margin-left:4px;">▶</span>
      </div>
      <div class="sector-stocks" id="stocks_${sectorKey}" style="display:none;padding:2px 0 4px 16px;"></div>`;
    }).join('');
  }

  // ── 4. 历史板块 ──
  const history = data.history || [];
  let historyHtml = '';
  if (history.length) {
    historyHtml = history.map(day => `
      <div class="history-day">
        <div class="history-day-label">${day.date}</div>
        <div class="history-sectors">
          ${day.top5.map((s,i) => `<span class="history-sector-tag rank${i+1}">${esc(s.name)} ${s.change>=0?'+':''}${s.change.toFixed(2)}%</span>`).join('')}
        </div>
      </div>`).join('');
  } else {
    historyHtml = '<div style="color:var(--muted);font-size:10px;">历史数据暂不可用</div>';
  }

  el.innerHTML = `
    <div style="display:flex;justify-content:flex-end;padding:2px 0 4px;">
      <button class="header-btn" id="sentimentRefreshBtn" title="刷新情绪数据" style="width:22px;height:22px;font-size:11px;">↻</button>
    </div>
    <div class="sent-section">
      <div class="sent-section-title" style="display:flex;align-items:center;">📈 沪深指数${srcTag(indexSrc, updatedAt)}</div>
      ${idxHtml || '<div style="color:var(--muted);font-size:10px;">获取失败（TDX 未连接且东财 fallback 异常）</div>'}
    </div>
    <div class="sent-section">
      <div class="sent-section-title" style="display:flex;align-items:center;">🌡️ 市场宽度${srcTag(breadthSrc, updatedAt)}</div>
      ${breadthHtml || '<div style="color:var(--muted);font-size:10px;">获取失败（东财接口异常）</div>'}
    </div>
    <div class="sent-section">
      <div class="sent-section-title" style="display:flex;align-items:center;">🔥 题材涨停排名${srcTag(sectorSrc, updatedAt)}</div>
      ${sectorHtml || '<div style="color:var(--muted);font-size:10px;">暂无数据（非交易时段或数据源未配置）</div>'}
    </div>
    <div class="sent-section">
      <div class="sent-section-title" style="display:flex;align-items:center;">📅 近7日板块热力${srcTag('', updatedAt)}</div>
      ${historyHtml}
    </div>
  `;
  bindSentimentRefreshBtn();

  // 绑定板块展开事件
  el.querySelectorAll('.sector-row').forEach(row => {
    row.addEventListener('click', () => {
      const key = row.dataset.sectorKey;
      const name = row.dataset.sectorName;
      const stocksDiv = document.getElementById(`stocks_${key}`);
      const arrow = row.querySelector('.sector-expand-arrow');
      if (!stocksDiv) return;
      const isOpen = stocksDiv.style.display !== 'none';
      if (isOpen) {
        stocksDiv.style.display = 'none';
        if (arrow) arrow.textContent = '▶';
      } else {
        stocksDiv.style.display = 'block';
        if (arrow) arrow.textContent = '▼';
        if (stocksDiv.innerHTML) return;
        stocksDiv.innerHTML = '<div style="color:var(--muted);font-size:10px;">加载中…</div>';
        fetchSectorTopStocks(name, stocksDiv);
      }
    });
  });
}

/* 通过 WS 请求板块前5只股票 */
function fetchSectorTopStocks(sectorName, stocksDiv) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'get_sector_stocks', sector_name: sectorName }));
  } else {
    if (stocksDiv) stocksDiv.innerHTML = '<div style="color:var(--muted);font-size:10px;">未连接引擎</div>';
  }
}

function bindSettingsEvents() {
  document.getElementById('settingsBackBtn')?.addEventListener('click', () => {
    settingsOpen = false;
    settingsPanel.classList.remove('active');
  });
  settingsPanel.querySelectorAll('.scheme-save-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      saveSchemes();
      btn.textContent = '✅ 已保存';
      btn.style.background = 'rgba(34,197,94,0.2)';
      setTimeout(() => { btn.textContent = '💾 保存'; btn.style.background = 'rgba(34,197,94,0.1)'; }, 1200);
    });
  });
  settingsPanel.querySelectorAll('.scheme-name-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const sc = schemes.find(x => x.id === inp.dataset.id);
      if (sc) {
        sc.name = inp.value.trim() || '未命名';
        saveSchemes(); renderSchemeBar();
        const tab = settingsPanel.querySelector(`.scheme-tab[data-id="${sc.id}"]`);
        if (tab) tab.textContent = sc.name;
      }
    });
  });
  // ── 删除方案（底部按钮，二次确认）──
  settingsPanel.querySelectorAll('.scheme-delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (schemes.length <= 1) return;
      if (btn.dataset.confirming === 'true') {
        // 第二次点击：真正删除
        const idx = schemes.findIndex(x => x.id === btn.dataset.id);
        if (idx >= 0) schemes.splice(idx, 1);
        if (activeSchemeTab === btn.dataset.id) activeSchemeTab = schemes[0]?.id;
        saveSchemes(); renderSettings(); renderSchemeBar();
      } else {
        // 第一次点击：进入确认状态
        btn.dataset.confirming = 'true';
        btn.textContent = '确认删除？';
        btn.style.color = '#ef4444';
        btn.style.borderColor = '#ef4444';
        setTimeout(() => {
          btn.dataset.confirming = '';
          btn.textContent = '🗑 删除此方案';
          btn.style.color = '';
          btn.style.borderColor = '';
        }, 3000);
      }
    });
  });
  // ── 条件 checkbox（更新启用/禁用状态样式）──
  settingsPanel.querySelectorAll('.cond-check').forEach(cb => {
    cb.addEventListener('change', () => {
      const sc = schemes.find(x => x.id === cb.dataset.scheme);
      if (sc && sc.conditions[cb.dataset.key]) {
        sc.conditions[cb.dataset.key].enabled = cb.checked;
        saveSchemes();
        // 更新行样式
        const row = cb.closest('.condition-row');
        if (row) {
          row.classList.toggle('enabled', cb.checked);
          row.classList.toggle('disabled', !cb.checked);
        }
        // 更新分组启用计数
        renderSettings();
      }
    });
  });
  settingsPanel.querySelectorAll('.cond-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const sc = schemes.find(x => x.id === inp.dataset.scheme);
      if (sc && sc.conditions[inp.dataset.key]) {
        const val = inp.tagName === 'SELECT' ? inp.value : (parseFloat(inp.value) || 0);
        sc.conditions[inp.dataset.key][inp.dataset.field] = val;
        saveSchemes();
      }
    });
  });
  // ── 分组折叠 ──
  settingsPanel.querySelectorAll('.cond-group-header').forEach(header => {
    header.addEventListener('click', () => {
      const body = header.nextElementSibling;
      const arrow = header.querySelector('.arrow');
      if (body) body.classList.toggle('collapsed');
      if (arrow) arrow.classList.toggle('collapsed');
    });
  });
  // ── 价格组合比较：动态行事件 ──
  settingsPanel.querySelectorAll('.pc-add-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sc = schemes.find(x => x.id === btn.dataset.scheme);
      if (!sc) return;
      if (!sc.conditions.priceCompare) sc.conditions.priceCompare = { enabled: false, rules: [] };
      if (!sc.conditions.priceCompare.rules) sc.conditions.priceCompare.rules = [{ dayL:1, fieldL:'close', op:'gt', dayR:2, fieldR:'close' }];
      sc.conditions.priceCompare.rules.push({ dayL:1, fieldL:'close', op:'gt', dayR:2, fieldR:'close' });
      saveSchemes(); renderSettings();
    });
  });
  settingsPanel.querySelectorAll('.pc-del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sc = schemes.find(x => x.id === btn.dataset.scheme);
      if (!sc || !sc.conditions.priceCompare || !sc.conditions.priceCompare.rules) return;
      const ri = parseInt(btn.dataset.ri);
      sc.conditions.priceCompare.rules.splice(ri, 1);
      saveSchemes(); renderSettings();
    });
  });
  settingsPanel.querySelectorAll('.pc-rule .pc-field').forEach(inp => {
    inp.addEventListener('change', () => {
      const row = inp.closest('.pc-rule');
      if (!row) return;
      const sc = schemes.find(x => x.id === row.dataset.scheme);
      if (!sc || !sc.conditions.priceCompare || !sc.conditions.priceCompare.rules) return;
      const ri = parseInt(row.dataset.ri);
      const rule = sc.conditions.priceCompare.rules[ri];
      if (!rule) return;
      const f = inp.dataset.f;
      if (f === 'multiplier') {
        const v = parseFloat(inp.value);
        if (isNaN(v) || inp.value.trim() === '') { delete rule.multiplier; } else { rule.multiplier = v; }
      } else {
        rule[f] = inp.tagName === 'SELECT' ? inp.value : (parseInt(inp.value) || 1);
      }
      saveSchemes();
    });
  });

  // ── 成交额组合比较：动态行事件 ──
  settingsPanel.querySelectorAll('.ac-add-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sc = schemes.find(x => x.id === btn.dataset.scheme);
      if (!sc) return;
      if (!sc.conditions.amountCompare) sc.conditions.amountCompare = { enabled: false, rules: [] };
      if (!sc.conditions.amountCompare.rules) sc.conditions.amountCompare.rules = [{ dayL:1, op:'gt', dayR:2 }];
      sc.conditions.amountCompare.rules.push({ dayL:1, op:'gt', dayR:2 });
      saveSchemes(); renderSettings();
    });
  });
  settingsPanel.querySelectorAll('.ac-del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sc = schemes.find(x => x.id === btn.dataset.scheme);
      if (!sc || !sc.conditions.amountCompare || !sc.conditions.amountCompare.rules) return;
      const ri = parseInt(btn.dataset.ri);
      sc.conditions.amountCompare.rules.splice(ri, 1);
      saveSchemes(); renderSettings();
    });
  });
  settingsPanel.querySelectorAll('.ac-rule .ac-field').forEach(inp => {
    inp.addEventListener('change', () => {
      const row = inp.closest('.ac-rule');
      if (!row) return;
      const sc = schemes.find(x => x.id === row.dataset.scheme);
      if (!sc || !sc.conditions.amountCompare || !sc.conditions.amountCompare.rules) return;
      const ri = parseInt(row.dataset.ri);
      const rule = sc.conditions.amountCompare.rules[ri];
      if (!rule) return;
      const f = inp.dataset.f;
      if (f === 'multiplier') {
        const v = parseFloat(inp.value);
        if (isNaN(v) || inp.value.trim() === '') { delete rule.multiplier; } else { rule.multiplier = v; }
      } else {
        rule[f] = inp.tagName === 'SELECT' ? inp.value : (parseInt(inp.value) || 1);
      }
      saveSchemes();
    });
  });

  // ── 布林线动态行事件（bollingerUp=bu, bollingerDown=bd）──
  for (const prefix of ['bu', 'bd']) {
    const condKey = prefix === 'bu' ? 'bollingerUp' : 'bollingerDown';
    const defaultBand = prefix === 'bu' ? 'upper' : 'lower';
    settingsPanel.querySelectorAll(`.${prefix}-add-btn`).forEach(btn => {
      btn.addEventListener('click', () => {
        const sc = schemes.find(x => x.id === btn.dataset.scheme);
        if (!sc) return;
        if (!sc.conditions[condKey]) sc.conditions[condKey] = { enabled: false, rules: [] };
        if (!sc.conditions[condKey].rules) sc.conditions[condKey].rules = [{ band: defaultBand, period: '20d' }];
        sc.conditions[condKey].rules.push({ band: defaultBand, period: '20d' });
        saveSchemes(); renderSettings();
      });
    });
    settingsPanel.querySelectorAll(`.${prefix}-del-btn`).forEach(btn => {
      btn.addEventListener('click', () => {
        const sc = schemes.find(x => x.id === btn.dataset.scheme);
        if (!sc || !sc.conditions[condKey] || !sc.conditions[condKey].rules) return;
        sc.conditions[condKey].rules.splice(parseInt(btn.dataset.ri), 1);
        saveSchemes(); renderSettings();
      });
    });
    settingsPanel.querySelectorAll(`.${prefix}-rule .${prefix}-field`).forEach(inp => {
      inp.addEventListener('change', () => {
        const row = inp.closest(`.${prefix}-rule`);
        if (!row) return;
        const sc = schemes.find(x => x.id === row.dataset.scheme);
        if (!sc || !sc.conditions[condKey] || !sc.conditions[condKey].rules) return;
        const rule = sc.conditions[condKey].rules[parseInt(row.dataset.ri)];
        if (!rule) return;
        rule[inp.dataset.f] = inp.value;
        saveSchemes();
      });
    });
  }

  // ── 策略 Tab 切换 ──
  settingsPanel.querySelectorAll('.scheme-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeSchemeTab = tab.dataset.id;
      renderSettings();
    });
  });
  // ── Tab 栏 + 新建策略 ──
  settingsPanel.querySelector('.scheme-tab-add')?.addEventListener('click', () => {
    const newScheme = { id: 'scheme_' + Date.now(), name: `方案${schemes.length + 1}`, enabled: true,
      conditions: { marketCap:{enabled:false,min:20,max:200}, bigOrder:{enabled:false,ratio:0.1}, amountHigh:{enabled:false,days:5}, amountLow:{enabled:false,days:5}, limitUp:{enabled:false}, limitDown:{enabled:false}, shortRise:{enabled:false,seconds:60,percent:3}, breakMinMA:{enabled:false,minutes:5}, breakDayMA:{enabled:false,period:5}, breakGolden:{enabled:false,days:20,ratio:0.382}, amountMultiple:{enabled:false,multiple:2}, volumeRatio:{enabled:false,min:2}, bollingerUp:{enabled:false,rules:[{band:'upper',period:'20d'}]}, bollingerDown:{enabled:false,rules:[{band:'lower',period:'20d'}]}, cupHandle:{enabled:false,days:20,dayA:5,dayB:10,minPct:10,maxPct:30}, priceCompare:{enabled:false,rules:[{dayL:1,fieldL:'close',op:'gt',dayR:2,fieldR:'close'}]}, amountCompare:{enabled:false,rules:[{dayL:1,op:'gt',dayR:2}]} }
    };
    schemes.push(newScheme);
    activeSchemeTab = newScheme.id;
    saveSchemes(); renderSettings(); renderSchemeBar();
  });
  // ── 从模板创建策略 ──
  document.getElementById('templateSelect')?.addEventListener('change', (e) => {
    const val = e.target.value;
    if (!val) return;
    const tpl = SCHEME_TEMPLATES.find(t => t.id === val);
    if (!tpl) return;
    const base = JSON.parse(JSON.stringify(schemes[0]?.conditions || DEFAULT_SCHEMES[0].conditions));
    for (const k in base) { if (base[k]) base[k].enabled = false; }
    for (const [k, v] of Object.entries(tpl.conditions)) {
      base[k] = { ...base[k], ...v };
    }
    const newScheme = { id: 'scheme_' + Date.now(), name: tpl.name, enabled: true, conditions: base };
    schemes.push(newScheme);
    activeSchemeTab = newScheme.id;
    saveSchemes(); renderSettings(); renderSchemeBar();
    e.target.value = '';
  });
}

/* ── 账户登录系统 ── */
function handleAuthResult(d) {
  const errorEl = document.getElementById('authError');
  if (d.success) {
    authUser = d.user;
    if (d.token) {
      authToken = d.token;
      localStorage.setItem('stock-radar-auth-token', d.token);
    }
    // 合并服务端数据
    if (d.saved_watchlist && d.saved_watchlist.length) {
      watchlist = [...new Set([...watchlist, ...d.saved_watchlist])];
    }
    // 始终同步本地数据到服务端
    if (watchlist.length) saveWatchlist();
    if (d.saved_schemes) {
      schemes = d.saved_schemes;
      localStorage.setItem('stock-radar-schemes', JSON.stringify(schemes));
      renderSchemeBar();
    } else if (schemes.length) {
      // 服务端无方案，同步本地方案上去
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ action: 'sync_schemes', schemes }));
    }
    updateAuthUI();
    document.getElementById('authOverlay').style.display = 'none';
  } else {
    if (errorEl) errorEl.textContent = d.error || '操作失败';
    // token 过期时清除并重新弹出登录
    if (d.error && d.error.includes('过期')) {
      authToken = null;
      localStorage.removeItem('stock-radar-auth-token');
      showAuthModal();
    }
  }
}

function updateAuthUI() {
  const btn = document.getElementById('authBtn');
  const label = document.getElementById('authUserLabel');
  const loginForm = document.getElementById('authLoginBtn')?.parentElement;
  const loggedIn = document.getElementById('authLoggedIn');
  if (authUser) {
    if (btn) btn.style.display = 'none';
    if (label) { label.style.display = 'inline'; label.textContent = authUser.username; }
    if (loginForm) {
      document.getElementById('authUsername').style.display = 'none';
      document.getElementById('authPassword').style.display = 'none';
      document.getElementById('authLoginBtn').style.display = 'none';
      document.getElementById('authRegisterBtn').style.display = 'none';
      document.getElementById('authError').style.display = 'none';
      document.getElementById('authModalTitle').textContent = '账户';
    }
    if (loggedIn) {
      loggedIn.style.display = 'block';
      document.getElementById('authLoggedName').textContent = authUser.username;
      const adminBtn = document.getElementById('authAdminBtn');
      if (adminBtn) adminBtn.style.display = authUser.is_admin ? 'block' : 'none';
      const adminHeaderBtn = document.getElementById('adminHeaderBtn');
      if (adminHeaderBtn) adminHeaderBtn.style.display = authUser.is_admin ? '' : 'none';
    }
  } else {
    if (btn) btn.style.display = '';
    if (label) label.style.display = 'none';
    if (loginForm) {
      document.getElementById('authUsername').style.display = '';
      document.getElementById('authPassword').style.display = '';
      document.getElementById('authLoginBtn').style.display = '';
      document.getElementById('authRegisterBtn').style.display = '';
      document.getElementById('authError').style.display = '';
      document.getElementById('authModalTitle').textContent = '登录';
    }
    if (loggedIn) loggedIn.style.display = 'none';
    const adminHeaderBtn2 = document.getElementById('adminHeaderBtn');
    if (adminHeaderBtn2) adminHeaderBtn2.style.display = 'none';
  }
}

function showAuthModal() {
  document.getElementById('authError').textContent = '';
  document.getElementById('authOverlay').style.display = 'flex';
  // 未登录时隐藏关闭按钮
  const closeBtn = document.getElementById('authCloseBtn');
  if (closeBtn) closeBtn.style.display = authUser ? '' : 'none';
  updateAuthUI();
}

// 登录按钮和用户名标签都打开模态框
document.getElementById('authBtn')?.addEventListener('click', showAuthModal);
document.getElementById('authUserLabel')?.addEventListener('click', showAuthModal);
document.getElementById('authCloseBtn')?.addEventListener('click', () => {
  if (!authUser) return; // 未登录不可关闭
  document.getElementById('authOverlay').style.display = 'none';
});
document.getElementById('authOverlay')?.addEventListener('click', (e) => {
  if (!authUser) return; // 未登录不可关闭
  if (e.target.id === 'authOverlay') document.getElementById('authOverlay').style.display = 'none';
});

document.getElementById('authLoginBtn')?.addEventListener('click', () => {
  const u = document.getElementById('authUsername').value.trim();
  const p = document.getElementById('authPassword').value;
  if (!u || !p) { document.getElementById('authError').textContent = '请填写用户名和密码'; return; }
  if (!ws || ws.readyState !== WebSocket.OPEN) { document.getElementById('authError').textContent = '正在连接服务器，请稍候...'; return; }
  ws.send(JSON.stringify({ action: 'login', username: u, password: p }));
});

document.getElementById('authRegisterBtn')?.addEventListener('click', () => {
  const u = document.getElementById('authUsername').value.trim();
  const p = document.getElementById('authPassword').value;
  if (!u || !p || p.length < 4) { document.getElementById('authError').textContent = '用户名不能为空，密码至少4位'; return; }
  if (!ws || ws.readyState !== WebSocket.OPEN) { document.getElementById('authError').textContent = '正在连接服务器，请稍候...'; return; }
  ws.send(JSON.stringify({ action: 'register', username: u, password: p }));
});

document.getElementById('authLogoutBtn')?.addEventListener('click', () => {
  authUser = null;
  authToken = null;
  localStorage.removeItem('stock-radar-auth-token');
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'logout' }));
  }
  updateAuthUI();
  showAuthModal(); // 退出后重新弹出登录框
});

document.getElementById('authAdminBtn')?.addEventListener('click', () => {
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'flex';
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'admin_get_users' }));
  }
  document.getElementById('adminTabUsers').textContent = '加载中…';
});

document.getElementById('adminHeaderBtn')?.addEventListener('click', () => {
  document.getElementById('adminPanel').style.display = 'flex';
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'admin_get_users' }));
  }
  document.getElementById('adminTabUsers').textContent = '加载中…';
});

document.getElementById('adminCloseBtn')?.addEventListener('click', () => {
  document.getElementById('adminPanel').style.display = 'none';
});

// Tab 切换
document.getElementById('adminTabs')?.addEventListener('click', (e) => {
  const btn = e.target.closest('.chart-mode-btn');
  if (!btn) return;
  const tab = btn.dataset.tab;
  document.querySelectorAll('#adminTabs .chart-mode-btn').forEach(b => b.classList.remove('active'));

});

function renderAdminPanel(users) {
  const usersEl = document.getElementById('adminTabUsers');
  const sectorsEl = document.getElementById('adminTabSectors');

  // ── 用户数据 Tab ──
  if (!users.length) { usersEl.textContent = '暂无用户数据'; }
  else {
    const table = document.createElement('table');
    table.style.cssText = 'width:100%;border-collapse:collapse;';
    const thead = document.createElement('thead');
    thead.innerHTML = '<tr style="border-bottom:1px solid var(--border);color:var(--muted);font-size:10px;text-align:left;">' +
      '<th style="padding:6px 8px;">用户名</th><th style="padding:6px 8px;">角色</th>' +
      '<th style="padding:6px 8px;">最近登录</th><th style="padding:6px 8px;">自选股</th><th style="padding:6px 8px;">方案</th></tr>';
    table.appendChild(thead);
    const tbody = document.createElement('tbody');
    const clickStyle = 'cursor:pointer;text-decoration:underline;color:var(--blue);';
    for (const u of users) {
      const tr = document.createElement('tr');
      tr.style.cssText = 'border-bottom:1px solid var(--border);';
      const role = u.is_admin ? '管理员' : '用户';
      const roleColor = u.is_admin ? 'var(--accent)' : 'var(--muted)';
      const lastLogin = u.last_login ? u.last_login.slice(0, 16) : '未登录';
      const wlCount = u.watchlist ? u.watchlist.length : 0;
      const scCount = u.schemes ? u.schemes.length : 0;

      const tdUser = document.createElement('td');
      tdUser.style.cssText = 'padding:6px 8px;color:var(--text);';
      tdUser.textContent = u.username;

      const tdRole = document.createElement('td');
      tdRole.style.cssText = `padding:6px 8px;color:${roleColor};font-size:10px;`;
      tdRole.textContent = role;

      const tdLogin = document.createElement('td');
      tdLogin.style.cssText = 'padding:6px 8px;color:var(--muted);font-size:10px;';
      tdLogin.textContent = lastLogin;

      // 自选股 —— 点击展开 alert-card 样式列表
      const tdWl = document.createElement('td');
      tdWl.style.cssText = 'padding:6px 8px;';
      const wlSpan = document.createElement('span');
      wlSpan.style.cssText = wlCount > 0 ? clickStyle : 'color:var(--muted);';
      wlSpan.textContent = wlCount;
      if (wlCount > 0) {
        wlSpan.addEventListener('click', () => {
          const existing = tr.nextElementSibling;
          if (existing && existing.dataset.detailType === 'watchlist-' + u.id) {
            existing.remove(); return;
          }
          const detailTr = document.createElement('tr');
          detailTr.dataset.detailType = 'watchlist-' + u.id;
          const detailTd = document.createElement('td');
          detailTd.colSpan = 5;
          detailTd.style.cssText = 'padding:8px;background:var(--card);';
          // 复用 alert-card 样式
          const cardsHtml = u.watchlist.map(code => {
            const concepts = (typeof CONCEPT_MAP !== 'undefined' && CONCEPT_MAP[code]) || [];
            const cTags = concepts.map(c => `<span class="concept-tag">${esc(c)}</span>`).join('');
            const cDiv = cTags ? `<div class="concept-tags">${cTags}</div>` : '';
            return `<div class="alert-card" style="margin-bottom:4px;cursor:default;">` +
              `<div class="alert-info"><div class="alert-top">` +
              `<span class="stock-code">${esc(code)}</span>${cDiv}` +
              `</div></div></div>`;
          }).join('');
          detailTd.innerHTML = cardsHtml;
          detailTr.appendChild(detailTd);
          tr.after(detailTr);
        });
      }
      tdWl.appendChild(wlSpan);

      // 方案 —— 点击展开只读方案编辑器
      const tdSc = document.createElement('td');
      tdSc.style.cssText = 'padding:6px 8px;';
      const scSpan = document.createElement('span');
      scSpan.style.cssText = scCount > 0 ? clickStyle : 'color:var(--muted);';
      scSpan.textContent = scCount;
      if (scCount > 0) {
        scSpan.addEventListener('click', () => {
          const existing = tr.nextElementSibling;
          if (existing && existing.dataset.detailType === 'schemes-' + u.id) {
            existing.remove(); return;
          }
          const detailTr = document.createElement('tr');
          detailTr.dataset.detailType = 'schemes-' + u.id;
          const detailTd = document.createElement('td');
          detailTd.colSpan = 5;
          detailTd.style.cssText = 'padding:8px;background:var(--card);';
          detailTd.appendChild(renderAdminSchemes(u.schemes));
          detailTr.appendChild(detailTd);
          tr.after(detailTr);
        });
      }
      tdSc.appendChild(scSpan);

      tr.appendChild(tdUser);
      tr.appendChild(tdRole);
      tr.appendChild(tdLogin);
      tr.appendChild(tdWl);
      tr.appendChild(tdSc);
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    usersEl.textContent = '';
    const title1 = document.createElement('div');
    title1.style.cssText = 'margin-bottom:8px;color:var(--muted);font-size:11px;';
    title1.textContent = `共 ${users.length} 个用户`;
    usersEl.appendChild(title1);
    usersEl.appendChild(table);
  }

  // ── 板块配置 Tab ──
  sectorsEl.textContent = '';
  const title2 = document.createElement('div');
  title2.style.cssText = 'font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;';
  title2.textContent = '板块涨幅配置（无真实数据时使用）';
  sectorsEl.appendChild(title2);

  const sectorTable = document.createElement('table');
  sectorTable.style.cssText = 'width:100%;border-collapse:collapse;margin-bottom:8px;';
  sectorTable.id = 'adminSectorTable';
  const stHead = document.createElement('thead');
  stHead.innerHTML = '<tr style="border-bottom:1px solid var(--border);color:var(--muted);font-size:10px;text-align:left;">' +
    '<th style="padding:4px 6px;">板块名称</th><th style="padding:4px 6px;">涨幅(%)</th><th style="padding:4px 6px;">龙头股</th></tr>';
  sectorTable.appendChild(stHead);
  const stBody = document.createElement('tbody');
  stBody.id = 'adminSectorBody';
  const inputStyle = 'width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);' +
    'border-radius:4px;padding:3px 6px;font-size:11px;outline:none;';
  for (let i = 0; i < 5; i++) {
    const row = document.createElement('tr');
    row.innerHTML = `<td style="padding:3px 4px;"><input class="sector-name" style="${inputStyle}" placeholder="如：AI芯片" /></td>` +
      `<td style="padding:3px 4px;"><input class="sector-change" type="number" step="0.01" style="${inputStyle}width:80px;" placeholder="5.20" /></td>` +
      `<td style="padding:3px 4px;"><input class="sector-leader" style="${inputStyle}" placeholder="如：寒武纪" /></td>`;
    stBody.appendChild(row);
  }
  sectorTable.appendChild(stBody);
  sectorsEl.appendChild(sectorTable);

  const btnWrap = document.createElement('div');
  btnWrap.style.cssText = 'display:flex;gap:8px;';
  const saveBtn = document.createElement('button');
  saveBtn.textContent = '保存配置';
  saveBtn.style.cssText = 'padding:4px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer;';
  saveBtn.addEventListener('click', () => {
    const rows = document.querySelectorAll('#adminSectorBody tr');
    const sectors = [];
    rows.forEach(r => {
      const name = r.querySelector('.sector-name').value.trim();
      const change = parseFloat(r.querySelector('.sector-change').value);
      const leader = r.querySelector('.sector-leader').value.trim();
      if (name && !isNaN(change)) {
        sectors.push({ name, change, leader: leader || '', isLimitCount: false });
      }
    });
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ action: 'admin_set_sectors', sectors }));
    }
  });
  const clearBtn = document.createElement('button');
  clearBtn.textContent = '清除（使用真实数据）';
  clearBtn.style.cssText = 'padding:4px 12px;background:rgba(255,255,255,0.08);color:var(--muted);border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;';
  clearBtn.addEventListener('click', () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ action: 'admin_set_sectors', sectors: [] }));
    }
    document.querySelectorAll('#adminSectorBody input').forEach(inp => { inp.value = ''; });
  });
  btnWrap.appendChild(saveBtn);
  btnWrap.appendChild(clearBtn);
  sectorsEl.appendChild(btnWrap);

  const statusDiv = document.createElement('div');
  statusDiv.id = 'adminSectorStatus';
  statusDiv.style.cssText = 'margin-top:6px;font-size:10px;color:var(--muted);';
  sectorsEl.appendChild(statusDiv);
}

// 渲染只读方案详情（复用方案编辑器组件）
function renderAdminSchemes(userSchemes) {
  const wrap = document.createElement('div');
  if (!userSchemes || !userSchemes.length) {
    wrap.textContent = '无方案';
    return wrap;
  }

  // 方案 Tab 栏（复用 scheme-tab 样式）
  const tabBar = document.createElement('div');
  tabBar.style.cssText = 'display:flex;gap:4px;margin-bottom:8px;';
  const panels = [];

  for (let i = 0; i < userSchemes.length; i++) {
    const s = userSchemes[i];
    const tab = document.createElement('button');
    tab.className = 'chart-mode-btn' + (i === 0 ? ' active' : '');
    tab.textContent = s.name || '未命名';
    tab.style.cssText = 'font-size:10px;padding:2px 8px;';

    const panel = document.createElement('div');
    panel.style.display = i === 0 ? '' : 'none';

    // 复用 CONDITION_GROUPS + CONDITION_DEFS 渲染只读方案
    const conditions = s.conditions || {};
    for (const group of CONDITION_GROUPS) {
      const groupDefs = group.keys.map(k => CONDITION_DEFS.find(d => d.key === k)).filter(Boolean);
      const enabledCount = groupDefs.filter(d => (conditions[d.key] || {}).enabled).length;
      if (enabledCount === 0) continue; // 跳过没有启用条件的分组

      const groupDiv = document.createElement('div');
      groupDiv.className = 'cond-group';
      const header = document.createElement('div');
      header.className = 'cond-group-header';
      header.innerHTML = `<span>${group.label}</span> <span class="group-count">${enabledCount} 项已启用</span>`;
      groupDiv.appendChild(header);

      const body = document.createElement('div');
      body.className = 'cond-group-body';
      body.style.display = '';

      for (const def of groupDefs) {
        const cond = conditions[def.key] || {};
        if (!cond.enabled) continue; // 只显示启用的条件
        const row = document.createElement('div');
        row.className = 'condition-row enabled';
        row.innerHTML = `<input type="checkbox" checked disabled style="accent-color:var(--accent);" />` +
          `<span class="cond-label">${def.label}</span>` +
          renderConditionInputs(def, cond, '__readonly__');
        // 禁用所有 input
        row.querySelectorAll('input,select').forEach(inp => { inp.disabled = true; });
        body.appendChild(row);
      }
      groupDiv.appendChild(body);
      panel.appendChild(groupDiv);
    }

    tab.addEventListener('click', () => {
      tabBar.querySelectorAll('.chart-mode-btn').forEach(b => b.classList.remove('active'));
      tab.classList.add('active');
      panels.forEach((p, j) => { p.style.display = j === i ? '' : 'none'; });
    });

    tabBar.appendChild(tab);
    panels.push(panel);
  }

  wrap.appendChild(tabBar);
  panels.forEach(p => wrap.appendChild(p));
  return wrap;
}
