name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -q
          pip install -r requirements-desktop.txt -q

      - name: Build DMG
        run: |
          rm -rf build dist
          pyinstaller stockradar.spec --noconfirm
          rm -f dist/StockRadar.dmg
          rm -rf dist/dmg_staging
          mkdir -p dist/dmg_staging
          cp -r dist/StockRadar.app dist/dmg_staging/
          cp install.command dist/dmg_staging/
          ln -s /Applications dist/dmg_staging/Applications
          hdiutil create -volname "StockRadar" \
            -srcfolder dist/dmg_staging \
            -ov -format UDZO \
            dist/StockRadar.dmg
          rm -rf dist/dmg_staging

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/StockRadar.dmg

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -q
          pip install -r requirements-desktop-win.txt -q

      - name: Generate ICO icon
        run: python scripts/generate_ico.py

      - name: Build EXE
        run: pyinstaller stockradar_win.spec --noconfirm

      - name: Package ZIP
        run: Compress-Archive -Path 'dist\StockRadar\*' -DestinationPath 'dist\StockRadar-Windows.zip' -Force
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/StockRadar-Windows.zip

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/StockRadar.dmg
            dist/StockRadar-Windows.zip
          generate_release_notes: true
